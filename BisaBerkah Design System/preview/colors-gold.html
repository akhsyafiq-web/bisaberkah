<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
  .ramp{display:grid;grid-template-columns:repeat(11,1fr);gap:0;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border-secondary)}
  .sw{height:64px;display:flex;align-items:flex-end;padding:6px 7px}
  .sw span{font-size:10px;font-weight:600;font-variant-numeric:tabular-nums}
  .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .name{font-weight:700;font-size:15px;color:var(--text-primary)}
  .meta{font-size:12px;color:var(--text-tertiary)}
  .keys{display:flex;gap:18px;margin-top:12px;font-size:12px;color:var(--text-secondary)}
  .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle}
</style></head>
<body>
  <div class="row"><div class="name">Accent — Barakah Gold</div><div class="meta">reserved for zakat · infak · sadaqah · milestones</div></div>
  <div class="ramp">
    <div class="sw" style="background:var(--gold-25)"><span style="color:#91560B">25</span></div>
    <div class="sw" style="background:var(--gold-50)"><span style="color:#91560B">50</span></div>
    <div class="sw" style="background:var(--gold-100)"><span style="color:#91560B">100</span></div>
    <div class="sw" style="background:var(--gold-200)"><span style="color:#623A11">200</span></div>
    <div class="sw" style="background:var(--gold-300)"><span style="color:#623A11">300</span></div>
    <div class="sw" style="background:var(--gold-400)"><span style="color:#623A11">400</span></div>
    <div class="sw" style="background:var(--gold-500);outline:2px solid #623A11;outline-offset:-2px"><span style="color:#fff">500</span></div>
    <div class="sw" style="background:var(--gold-600)"><span style="color:#fff">600</span></div>
    <div class="sw" style="background:var(--gold-700)"><span style="color:#fff">700</span></div>
    <div class="sw" style="background:var(--gold-800)"><span style="color:#fff">800</span></div>
    <div class="sw" style="background:var(--gold-900)"><span style="color:#fff">900</span></div>
  </div>
  <div class="keys">
    <span><span class="dot" style="background:var(--gold-500)"></span>500 — accent</span>
    <span><span class="dot" style="background:var(--gold-50)"></span>50 — zakat surface tint</span>
    <span><span class="dot" style="background:var(--gold-600)"></span>600 — zakat figures</span>
  </div>
</body></html>
