<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px;background:var(--gray-50);font-family:var(--font-sans)}
  .name{font-weight:700;font-size:14px;color:var(--text-primary);margin-bottom:14px}
  .nav{display:flex;align-items:flex-end;justify-content:space-between;background:#fff;border:1px solid var(--border-secondary);
       border-radius:var(--radius-2xl);box-shadow:var(--shadow-md);padding:10px 18px;max-width:380px;position:relative}
  .item{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:600;color:var(--gray-400);width:56px}
  .item.active{color:var(--brand-600)}
  .item svg{width:24px;height:24px}
  .fab{width:52px;height:52px;border-radius:50%;background:var(--brand-600);display:grid;place-items:center;
       box-shadow:var(--shadow-brand);margin-top:-26px;border:4px solid var(--gray-50)}
  .fab svg{width:24px;height:24px;color:#fff}
</style></head>
<body>
  <div class="name">Bottom navigation · tab bar</div>
  <div class="nav">
    <div class="item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>Beranda</div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 14 4-4 3 3 5-6"/></svg>Laporan</div>
    <div class="fab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Tujuan</div>
    <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 15h2a2 2 0 1 0 0-4h-3c-.6 0-1.1.2-1.4.6L3 17"/><path d="m7 21 1.6-1.4c.3-.4.8-.6 1.4-.6h4c1.1 0 2.1-.4 2.8-1.2l4.6-4.4a2 2 0 0 0-2.75-2.91l-4.2 3.9"/><path d="m2 16 6 6"/></svg>Zakat</div>
  </div>
</body></html>
