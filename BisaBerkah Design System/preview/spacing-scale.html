<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
  .name{font-weight:700;font-size:15px;color:var(--text-primary);margin-bottom:18px}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:9px}
  .bar{height:16px;background:var(--brand-400);border-radius:3px}
  .tag{width:120px;font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary)}
</style></head>
<body>
  <div class="name">Spacing scale · 4px base grid</div>
  <div class="row"><span class="tag">space-1 · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="tag">space-2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tag">space-3 · 12</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="tag">space-4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tag">space-6 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tag">space-8 · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tag">space-12 · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="tag">space-16 · 64</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="tag">space-24 · 96</span><div class="bar" style="width:96px"></div></div>
</body></html>
