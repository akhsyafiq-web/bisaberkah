<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff}
  .item{display:flex;align-items:baseline;gap:16px;padding:9px 0;border-bottom:1px solid var(--border-secondary)}
  .item:last-child{border:0}
  .tag{width:96px;flex:none;font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary)}
  .spec{line-height:1.05;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style></head>
<body>
  <div class="item"><span class="tag">display-lg<br>48 · 700</span><span class="spec" style="font:800 48px/1 var(--font-sans);letter-spacing:-.03em">Rp24.500.000</span></div>
  <div class="item"><span class="tag">display-sm<br>30 · 700</span><span class="spec" style="font:700 30px/1 var(--font-sans);letter-spacing:-.02em">Catat berkah, raih tujuan</span></div>
  <div class="item"><span class="tag">display-xs<br>24 · 700</span><span class="spec" style="font:700 24px/1 var(--font-sans);letter-spacing:-.01em">Tujuan keluarga kita</span></div>
  <div class="item"><span class="tag">text-xl<br>20 · 600</span><span class="spec" style="font:600 20px/1 var(--font-sans)">Pengeluaran bulan ini</span></div>
  <div class="item"><span class="tag">text-md<br>16 · 400</span><span class="spec" style="font:400 16px/1 var(--font-sans);color:var(--text-secondary)">Kamu hemat 12% dibanding April.</span></div>
</body></html>
