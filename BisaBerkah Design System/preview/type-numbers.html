<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
  .name{font-weight:700;font-size:15px;color:var(--text-primary);margin-bottom:4px}
  .sub{font-size:12px;color:var(--text-tertiary);margin-bottom:18px}
  .grid{display:flex;gap:36px;align-items:flex-end;flex-wrap:wrap}
  .lab{font-size:12px;color:var(--text-tertiary);margin-top:6px}
</style></head>
<body>
  <div class="name">Monetary figures</div>
  <div class="sub">Plus Jakarta Sans · 800 · tabular-nums · −0.02em · Rp with dot separators, comma decimal</div>
  <div class="grid">
    <div><div class="amount" style="font-size:44px">Rp24.500.000</div><div class="lab">balance · display</div></div>
    <div><div class="amount" style="font-size:24px;color:var(--money-in)">+Rp3.200.000</div><div class="lab">income</div></div>
    <div><div class="amount" style="font-size:24px;color:var(--text-primary)">−Rp185.000</div><div class="lab">expense (neutral)</div></div>
    <div><div class="amount" style="font-size:24px;color:var(--money-zakat)">Rp250.000</div><div class="lab">zakat (gold)</div></div>
    <div><div class="amount" style="font-size:20px">Rp12,5jt</div><div class="lab">abbreviated</div></div>
  </div>
</body></html>
